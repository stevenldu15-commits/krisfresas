<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KrisFresas</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#fff0f3;
}

/* LOGO */

.logo-header{
background:linear-gradient(90deg,#3a0f0f,#8b0000);
text-align:center;
padding:30px;
color:white;
}

.logo{
font-size:45px;
font-weight:bold;
animation:flotar 3s infinite ease-in-out;
}

.logo span{
color:#ffb3c6;
text-shadow:0 0 10px rgba(255,0,0,0.6);
}

@keyframes flotar{

0%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0px);}

}

/* HERO */

.hero{
text-align:center;
padding:50px 20px;
}

.hero h2{
color:#8b0000;
font-size:32px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
}

/* PRODUCTOS */

.productos{
text-align:center;
padding:50px;
}

.producto{
background:white;
padding:20px;
border-radius:15px;
width:320px;
margin:auto;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.producto img{
width:100%;
border-radius:10px;
}

.producto h3{
margin-top:10px;
}

.precio{
color:#c4002f;
font-size:30px;
font-weight:bold;
margin:10px;
}

/* BOTONES */

.boton{
background:#c4002f;
color:white;
padding:12px 20px;
border-radius:25px;
text-decoration:none;
display:inline-block;
margin-top:10px;
transition:.3s;
}

.boton:hover{
background:#8b0022;
}

/* CONTACTO */

.contacto{
background:#3a0f0f;
color:white;
text-align:center;
padding:40px;
margin-top:40px;
}

/* FOOTER */

footer{
background:#220808;
color:white;
text-align:center;
padding:15px;
}

/* BOTON WHATSAPP */

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
font-size:30px;
padding:15px;
border-radius:50%;
text-decoration:none;
box-shadow:0 5px 15px rgba(0,0,0,.3);
}

</style>

</head>

<body>

<header class="logo-header">

<div class="logo">
🍓🍫 <span>KrisFresas</span>
</div>

<p>Fresas con chocolate irresistibles</p>

</header>

<h2>Las mejores fresas con chocolate</h2>

<p>Hechas con amor y chocolate delicioso</p>

</section>


<section class="productos">

<h2>Nuestros Productos</h2>

<div class="producto">

<img src="fresas-blancas.jpg" alt="Fresas con chocolate">

<h3>Fresas con Chocolate Blanco</h3>

<p class="precio">$2.99</p>

<a class="boton" href="https://wa.me/593982126368?text=Hola quiero pedir las fresas con chocolate de $2.99">
Pedir por WhatsApp
</a>

</div>

</section>


<section class="contacto">

<h2>Contacto</h2>

<p>📱 0982126368</p>
<p>📱 0962000142</p>

<p>Pedidos por WhatsApp</p>

</section>


<footer>

<p>© 2026 KrisFresas</p>

</footer>


<a class="whatsapp" href="https://wa.me/593982126368">
💬
</a>

</body>

</html>
